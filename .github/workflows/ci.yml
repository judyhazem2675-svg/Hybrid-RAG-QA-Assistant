name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install lint dependencies
        run: python -m pip install ruff

      - name: Run Ruff when Python files exist
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          roots = [Path("src"), Path("scripts"), Path("tests"), Path("app")]
          python_files = [
              file
              for root in roots
              if root.exists()
              for file in root.rglob("*.py")
              if "__pycache__" not in file.parts
          ]

          if not python_files:
              print("No Python files found yet. Lint stage passes for the CI scaffold.")
              raise SystemExit(0)

          command = [sys.executable, "-m", "ruff", "check", *map(str, python_files)]
          raise SystemExit(subprocess.call(command))
          PY

  unit-tests:
    name: Unit Tests With Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov

      - name: Pull DVC dataset when credentials are configured
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -f DataSet.zip.dvc ] && [ ! -f DataSet.zip ]; then
            if [ -z "$DAGSHUB_TOKEN" ]; then
              echo "DAGSHUB_TOKEN secret is not configured; dataset-dependent tests may skip."
              exit 0
            fi
            python -m pip install dvc
            python -m dvc remote modify dagshub --local auth basic
            python -m dvc remote modify dagshub --local user kadry720
            python -m dvc remote modify dagshub --local password "$DAGSHUB_TOKEN"
            python -m dvc pull DataSet.zip.dvc
          fi

      - name: Run tests and enforce coverage when tests exist
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          test_files = list(Path("tests").glob("test_*.py")) if Path("tests").exists() else []
          if not test_files:
              print("No tests found yet. Unit-test stage passes for the CI scaffold.")
              raise SystemExit(0)

          command = [sys.executable, "-m", "pytest", "tests"]
          if Path("src").exists():
              command += [
                  "--cov=src",
                  "--cov-report=term-missing",
                  "--cov-report=xml",
                  "--cov-fail-under=70",
              ]

          raise SystemExit(subprocess.call(command))
          PY

      - name: Upload coverage report
        if: hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Pull DVC dataset when credentials are configured
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -f DataSet.zip.dvc ] && [ ! -f DataSet.zip ]; then
            if [ -z "$DAGSHUB_TOKEN" ]; then
              echo "DAGSHUB_TOKEN secret is not configured; dataset validation may skip."
              exit 0
            fi
            python -m pip install dvc
            python -m dvc remote modify dagshub --local auth basic
            python -m dvc remote modify dagshub --local user kadry720
            python -m dvc remote modify dagshub --local password "$DAGSHUB_TOKEN"
            python -m dvc pull DataSet.zip.dvc
          fi

      - name: Run dataset validation when available
        run: |
          if [ -f tests/test_data_validation.py ]; then
            python -m pytest tests/test_data_validation.py
          else
            echo "No dataset validation test found yet. Data-validation stage passes for the CI scaffold."
          fi

  model-validation:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install model-validation dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Pull DVC dataset when credentials are configured
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -f DataSet.zip.dvc ] && [ ! -f DataSet.zip ]; then
            if [ -z "$DAGSHUB_TOKEN" ]; then
              echo "DAGSHUB_TOKEN secret is not configured; model validation may skip."
              exit 0
            fi
            python -m pip install dvc
            python -m dvc remote modify dagshub --local auth basic
            python -m dvc remote modify dagshub --local user kadry720
            python -m dvc remote modify dagshub --local password "$DAGSHUB_TOKEN"
            python -m dvc pull DataSet.zip.dvc
          fi

      - name: Run model or retriever validation when available
        run: |
          if [ -f tests/test_model_validation.py ]; then
            python -m pytest tests/test_model_validation.py
          elif [ -f tests/test_retriever_validation.py ]; then
            python -m pytest tests/test_retriever_validation.py
          else
            echo "No model/retriever validation test found yet. Model-validation stage passes for the CI scaffold."
          fi

